services:
  screening-api:
    build: .
    container_name: screening-api
    environment:
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - DATABASE_URL=postgresql+psycopg2://screening:screening@postgres:5432/screening_db
      - HMAC_SECRET=dev-secret-key
    ports:
      - "8000:8000"
    depends_on:
      - opensearch
      - postgres

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    container_name: opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.15.0
    container_name: opensearch-dashboards
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      - opensearch

  postgres:
    image: postgres:16
    container_name: screening-postgres
    environment:
      - POSTGRES_USER=screening
      - POSTGRES_PASSWORD=screening
      - POSTGRES_DB=screening_db
    ports:
      - "5432:5432"
